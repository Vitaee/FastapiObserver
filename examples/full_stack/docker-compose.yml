# ============================================================================
# Full-Stack Observability Demo — Docker Compose
#
# Three FastAPI services + OTel Collector + Prometheus + Loki + Tempo + Grafana
#
# Usage:
#   docker compose up --build
#   ./generate_traffic.sh
#   Open http://localhost:3000 (Grafana, admin/admin)
# ============================================================================

x-app-base: &app-base
  build:
    context: ../../
    dockerfile: examples/full_stack/Dockerfile
  environment: &app-env
    ENVIRONMENT: "local"
    APP_VERSION: "1.0.0"
    LOG_LEVEL: "INFO"
    METRICS_ENABLED: "true"
    OTEL_ENABLED: "true"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_TRACE_SAMPLING_RATIO: "1.0"
    OTEL_LOGS_ENABLED: "true"
    OTEL_LOGS_MODE: "both"
    OTEL_LOGS_ENDPOINT: "http://otel-collector:4317"
    OTEL_LOGS_PROTOCOL: "grpc"
  depends_on:
    otel-collector:
      condition: service_started
  restart: unless-stopped

services:
  # ---------- FastAPI application instances ----------

  app-a:
    <<: *app-base
    container_name: app-a
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
      SERVICE_NAME: "app-a"
      APP_NAME: "demo-api"
      OTEL_SERVICE_NAME: "app-a"
      TARGET_B: "http://app-b:8000"
      TARGET_C: "http://app-c:8000"

  app-b:
    <<: *app-base
    container_name: app-b
    ports:
      - "8001:8000"
    environment:
      <<: *app-env
      SERVICE_NAME: "app-b"
      APP_NAME: "demo-api"
      OTEL_SERVICE_NAME: "app-b"
      TARGET_B: "http://app-a:8000"
      TARGET_C: "http://app-c:8000"

  app-c:
    <<: *app-base
    container_name: app-c
    ports:
      - "8002:8000"
    environment:
      <<: *app-env
      SERVICE_NAME: "app-c"
      APP_NAME: "demo-api"
      OTEL_SERVICE_NAME: "app-c"
      TARGET_B: "http://app-a:8000"
      TARGET_C: "http://app-b:8000"

  # ---------- OpenTelemetry Collector ----------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./config/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  # ---------- Prometheus ----------

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ---------- Loki ----------

  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  # ---------- Tempo ----------

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./config/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"    # Tempo API
    restart: unless-stopped

  # ---------- Grafana ----------

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  loki-data:
  tempo-data:
