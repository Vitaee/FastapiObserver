version: '3.8'

services:
  # -------------------------------------------------------------------------
  # LOCAL TRACING BACKEND
  # -------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-all-in-one
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger Search UI
      - "4317:4317"   # OTLP gRPC receiver (where our FastAPI apps send traces)
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # LOCAL METRICS BACKEND
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI
    restart: unless-stopped
    # Use host network on Linux to reach localhost:8001 easily, 
    # but for macOS/Windows we use strictly docker-specific host resolution in prometheus.yml
