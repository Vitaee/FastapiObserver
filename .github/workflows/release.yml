name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.3.1). Optional when run on tag push."
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$TAG" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$TAG" ]]; then
            TAG="v$(awk -F '"' '/__version__/ { print $2; exit }' src/fastapiobserver/_version.py)"
          fi
          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build package
        run: |
              python -m pip install --upgrade pip
              python -m pip install build twine
              python -m build
              python -m twine check dist/*

      - name: Build release notes from changelog
        run: |
          python scripts/extract_changelog_section.py "${{ steps.meta.outputs.version }}" > RELEASE_NOTES.md

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: RELEASE_NOTES.md
          make_latest: true
