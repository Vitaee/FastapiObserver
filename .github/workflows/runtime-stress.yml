name: Runtime Stress

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Stress profile to run
        required: true
        default: standard
        type: choice
        options:
          - quick
          - standard
          - deep
  schedule:
    # Weekly quick stress validation every Monday at 04:00 UTC.
    - cron: "0 4 * * 1"

jobs:
  runtime-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,prometheus,otel]"

      - name: Run runtime stress harness
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then
            PROFILE="quick"
          fi
          echo "Running runtime stress profile: $PROFILE"
          python scripts/runtime_stress.py --profile "$PROFILE" --json
